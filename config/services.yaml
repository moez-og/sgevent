# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\HfImageService:
        arguments:
            $hfToken: '%env(HF_TOKEN)%'
            $model: '%env(HF_IMAGE_MODEL)%'
            $projectDir: '%kernel.project_dir%'

    # ═══ Notion Sync (v2) ═══
    App\Service\NotionService:
        arguments:
            $notionApiKey: '%env(NOTION_TOKEN)%'
            $notionDatabaseId: '%env(NOTION_DATABASE_ID)%'

    # ═══ Recommendation Service ═══
    App\Service\RecommendationService:
        arguments:
            $geminiApiKey: '%env(default::GEMINI_API_KEY)%'
